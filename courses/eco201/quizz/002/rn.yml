question: None umwigisha w'ico cirwa?
answer: Théo Mogenet 
wrong_answers:
   - Théo Boloré
  - Descoupes Bitco
  - Nta nyishu nimwe irimwomo.
explanation: |
  Ico kigabane kivuga ko umwigisha w’ivyo vyigwa ari .
  Théo Mogenet, umwigisha w’umunyamwete(abikora abikunze cane) kandi afise uruhara runini mu
  Ubutunzi bwa Otirishi.
reviewed: true
